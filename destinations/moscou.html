<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moscou, Russie | Le Bourbistan</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .destination-wrap { padding-top: calc(var(--nav-h) + 5rem); padding-bottom: 4rem; max-width: 1200px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; }
    #destination-titre { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 500; margin-bottom: 3rem; animation: fadeUp 0.8s ease both; }
    #destination-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 4rem; animation: fadeUp 0.8s ease both; animation-delay: 0.15s; }
    .video-embed { position: relative; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #111; }
    .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    #destination-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .destination-photo-item { animation: fadeUp 0.8s ease both; }
    .destination-photo-frame { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; background: #111; }
    .destination-photo-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.4,0,0.2,1); }
    .destination-photo-frame:hover img { transform: scale(1.04); }
    .photo-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 1rem 1rem; background: linear-gradient(transparent, rgba(0,0,0,0.7)); font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 13px; opacity: 0; transform: translateY(6px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .destination-photo-frame:hover .photo-caption { opacity: 1; transform: translateY(0); }
    .photo-sig { position: absolute; bottom: 1rem; right: 1.2rem; opacity: 0.5; pointer-events: none; }
    .photo-sig svg { width: 70px; }
    @media (max-width: 800px) { #destination-photos { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav id="navbar"></nav>
  <main class="destination-wrap">
    <h1 id="destination-titre"></h1>
    <div id="destination-videos"></div>
    <div id="destination-photos"></div>
  </main>
  <footer id="footer"></footer>
  <script src="../assets/components.js"></script>
  <script src="../assets/gallery.js"></script>
  <script>
    injectNav('destinations');
    injectFooter();
    buildDestination('moscou');
  </script>
</body>
</html>
